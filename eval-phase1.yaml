name: vllm-test-audit-phase1
description: Phase 1 only evaluation of vllm-test-audit audit-agent

skill: ""

optimize:
  target: audit-contract

execution:
  mode: case
  arguments: >-
    Use the audit agent (subagent_type: vllm-test-audit:audit-agent)
    to audit {directory}. Run in FOREGROUND (run_in_background: false)
    and wait for completion. The agent writes audit-cc.json and
    audit-not-cc.json to the cwd.
  timeout: 3600
  max_budget_usd: 5.00

runner:
  type: claude-code
  effort: high
  plugin_dirs:
    - ./vllm-test-audit

permissions:
  allow:
    - "Read"
    - "Edit"
    - "Write"
    - "Bash(*)"
    - "Agent(*)"
    - "Skill(*)"
    - "WebFetch(*)"
    - "WebSearch(*)"
    - "SendMessage(*)"
    - "TaskCreate"
    - "TaskUpdate"
    - "TaskList"
    - "TaskGet"
    - "mcp__*"

hooks:
  before_each:
    - command: >-
        python3 "$(dirname "$AGENT_EVAL_CONFIG")/scripts/setup_workspace.py"
      description: "Symlink vLLM tests, add additionalDirectories, trust workspace"
  after_each:
    - command: >-
        python3 "$(dirname "$AGENT_EVAL_CONFIG")/scripts/fp_fn_report.py"
      description: "Generate FP/FN classification report from audit output vs golden.csv"

models:
  skill: opus

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

dataset:
  path: cases
  schema: |
    Each case has a 'directory' field pointing to a vLLM test directory to audit.

outputs:
  - path: audit-cc.json
    schema: "Phase 1 CC candidates with classification and c1/c2/c3 criteria"
  - path: audit-not-cc.json
    schema: "Phase 1 non-CC candidates"
  - path: fp_fn_report.md
    schema: "Markdown report listing false positives and false negatives against golden.csv with per-test criteria details"

judges:
  - name: f1_score
    module: judges.f1_score
    function: judge
    description: "F1 score against expert-verified golden.csv"
    score_range: [0, 1]
    arguments:
      golden_path: golden.csv

  - name: cost_per_test
    module: judges.cost_per_test
    function: judge
    description: "Token cost efficiency normalized by tests analyzed"
    score_range: [0, 1]
    arguments:
      target_cost_per_test: 0.50

thresholds:
  f1_score:
    min_mean: 0.90
  cost_per_test:
    min_mean: 0.80

reward:
  formula: weighted
  weights:
    f1_score: 0.7
    cost_per_test: 0.3
  score_range: [0, 1]
  raw: [f1_score, cost_per_test]
  gate: false
