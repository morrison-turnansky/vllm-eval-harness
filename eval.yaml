name: vllm-test-audit-eval
description: Precision/recall and token efficiency evaluation of vllm-test-audit

# Empty because the audit is invoked via Agent tool (agent type
# vllm-test-audit:audit-agent), not a slash command. When empty,
# execute.py sends the arguments as a plain prompt.
skill: ""

execution:
  mode: case
  arguments: >-
    Use the audit-agent (subagent_type: vllm-test-audit:audit-agent) to
    analyze {directory}. The vLLM test files are symlinked into the current
    working directory under tests/. IMPORTANT: run the agent in the FOREGROUND
    (run_in_background: false) and wait for it to complete. The agent must
    write audit-cc.json and audit-not-cc.json to the current working directory.
    After the agent finishes, verify those files exist and are non-empty.
  timeout: 3600
  max_budget_usd: 5.00

runner:
  type: claude-code
  effort: high
  plugin_dirs:
    - /home/devuser/projects/ai-marketplace

permissions:
  allow:
    - "Read"
    - "Edit"
    - "Write"
    - "Bash(*)"
    - "Agent(*)"
    - "Skill(*)"
    - "WebFetch(*)"
    - "WebSearch(*)"
    - "SendMessage(*)"
    - "TaskCreate"
    - "TaskUpdate"
    - "TaskList"
    - "TaskGet"
    - "mcp__*"

hooks:
  before_each:
    - command: >-
        python3 "$(dirname "$AGENT_EVAL_CONFIG")/scripts/setup_workspace.py"
      description: "Symlink vLLM tests, add additionalDirectories, trust workspace"

models:
  skill: opus

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

dataset:
  path: cases
  schema: |
    Each case has a 'directory' field pointing to a vLLM test directory to audit.

outputs:
  - path: audit-cc.json
    schema: "Phase 1 CC candidates with classification and c1/c2/c3 criteria"
  - path: audit-not-cc.json
    schema: "Phase 1 non-CC candidates"
  - path: review-cc.json
    schema: "Phase 2 reviewed candidates with AGREE/RECLASSIFY verdicts"

judges:
  - name: classification_accuracy
    type: module
    module: judges.classification_judge
    function: judge
    description: "Per-test classification match rate against expert-verified golden.csv"
    arguments:
      golden_path: golden.csv

  - name: token_efficiency
    builtin: efficiency/cost_budget
    description: "Per-invocation cost gate"
    arguments:
      max_cost_usd: 5.00

thresholds:
  classification_accuracy:
    min_pass_rate: 0.90
  token_efficiency:
    min_pass_rate: 1.0
