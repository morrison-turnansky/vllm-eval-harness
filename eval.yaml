name: vllm-test-audit-eval
description: F1 and token efficiency evaluation of vllm-test-audit

# Empty because the audit is invoked via Agent tool (coordinator-agent),
# not a slash command. When empty, execute.py sends the arguments as a
# plain natural-language prompt.
skill: ""

optimize:
  target: audit-contract

execution:
  mode: case
  arguments: >-
    Use the coordinator agent (subagent_type: vllm-test-audit:coordinator-agent)
    to run the full audit pipeline on {directory}. Run in FOREGROUND
    (run_in_background: false) and wait for completion. The agent writes
    audit-cc.json, audit-not-cc.json, and review-cc.json to the cwd.
  timeout: 3600
  max_budget_usd: 5.00

runner:
  type: claude-code
  effort: high
  plugin_dirs:
    - ./vllm-test-audit

permissions:
  allow:
    - "Read"
    - "Edit"
    - "Write"
    - "Bash(*)"
    - "Agent(*)"
    - "Skill(*)"
    - "WebFetch(*)"
    - "WebSearch(*)"
    - "SendMessage(*)"
    - "TaskCreate"
    - "TaskUpdate"
    - "TaskList"
    - "TaskGet"
    - "mcp__*"

hooks:
  before_each:
    - command: >-
        python3 "$(dirname "$AGENT_EVAL_CONFIG")/scripts/setup_workspace.py"
      description: "Symlink vLLM tests, add additionalDirectories, trust workspace"

models:
  skill: opus

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

dataset:
  path: cases
  schema: |
    Each case has a 'directory' field pointing to a vLLM test directory to audit.

outputs:
  - path: audit-cc.json
    schema: "Phase 1 CC candidates with classification and c1/c2/c3 criteria"
  - path: audit-not-cc.json
    schema: "Phase 1 non-CC candidates"
  - path: review-cc.json
    schema: "Phase 2 reviewed candidates with AGREE/RECLASSIFY verdicts"

judges:
  - name: f1_score
    module: judges.f1_score
    function: judge
    description: "F1 score against expert-verified golden.csv"
    score_range: [0, 1]
    arguments:
      golden_path: golden.csv

  - name: cost_per_test
    module: judges.cost_per_test
    function: judge
    description: "Raw $/test — lower is better"

  - name: phase_delta
    module: judges.phase_delta
    function: judge
    description: "Phase 2 marginal F1 contribution (positive = helpful)"
    score_range: [-1, 1]
    arguments:
      golden_path: golden.csv

thresholds:
  f1_score:
    min_mean: 0.90
  cost_per_test:
    max_mean: 0.40

reward:
  formula: weighted
  weights:
    f1_score: 1.0
  score_range: [0, 1]
  raw: [f1_score, cost_per_test]
  gate: false
